name: Release Build and Publish

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish artifacts to (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release target
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.release_tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release already exists for tag ${tag}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                draft: false,
                prerelease: false,
                generate_release_notes: true
              });
              core.info(`Created release ${created.data.html_url}`);
            }

  docker-publish:
    name: Build and publish server Docker image
    runs-on: ubuntu-latest
    needs: [resolve-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR (current owner)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR (Vivek-Raman namespace)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_SECONDARY_USERNAME }}
          password: ${{ secrets.GHCR_SECONDARY_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.owner.outputs.value }}/spartan-write-server
            ghcr.io/vivek-raman/packages/spartan-write-server
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  desktop-build:
    name: Build and upload desktop artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [resolve-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            target_triple: aarch64-apple-darwin
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production bundles
        env:
          RUST_BACKTRACE: "1"
          CARGO_TERM_VERBOSE: "true"
          RUST_LOG: "debug"
          TAURI_LOG_LEVEL: "debug"
        run: uv run python build.py

      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target_triple }}
          path: frontend/src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 30

      - name: Prepare uniquely named release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          triple="${{ matrix.target_triple }}"

          while IFS= read -r -d '' src; do
            file="$(basename "$src")"
            base="${file%.*}"
            ext="${file##*.}"
            if [ "$base" = "$file" ]; then
              candidate="${base}-${triple}"
            else
              candidate="${base}-${triple}.${ext}"
            fi

            out="release-assets/${candidate}"
            i=1
            while [ -e "$out" ]; do
              if [ "$base" = "$file" ]; then
                out="release-assets/${base}-${triple}-${i}"
              else
                out="release-assets/${base}-${triple}-${i}.${ext}"
              fi
              i=$((i + 1))
            done
            cp "$src" "$out"
          done < <(find frontend/src-tauri/target/release/bundle -type f -print0)

      - name: Attach this OS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          files: release-assets/**
          fail_on_unmatched_files: true
